<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="script.js"> </script>
</head>
<body oncontextmenu="return false">
  <div class="container unselectable">
    <div class="profile">
      <div>
        <div class="round">
          <div class="dp">
            <div class="img-profile">
                <a href="https://medium.com/@chimengchi" target="_blank">
                  <img src="img.jpg">
                </a>
              </div>
            <div class="type">Pro</div>
          </div>
        </div>
      </div>
      
      <div class="details">
        <div class="name">Worakun Ata!</div>
        <div class="id">
          <a href="https://programming.in.th/profile.php?id=113224" target="_blank">
            @ChimengSoso
          </a>
        </div>
      </div>

      <div class="social-icons">
        <a class="social-icon yt" href="https://www.youtube.com/codemeng" target="_blank" aria-label="YouTube"><i class="fa fa-youtube"></i></a>
        <a class="social-icon fb" href="https://www.facebook.com/codemeng" target="_blank" aria-label="Facebook"><i class="fa fa-facebook"></i></a>
        <a class="social-icon gh" href="https://github.com/ChimengSoso" target="_blank" aria-label="GitHub"><i class="fa fa-github"></i></a>
        <a class="social-icon ig" href="https://www.instagram.com/chimengsoso/" target="_blank" aria-label="Instagram"><i class="fa fa-instagram"></i></a>
      </div>

      <a class="featured-link" href="knowledge/index.html">
        <div class="featured-link-icon"><i class="fa fa-book"></i></div>
        <div class="featured-link-text">
          <span class="featured-link-title">หมวดความรู้</span>
          <span class="featured-link-sub">บทความและความรู้ต่าง ๆ</span>
        </div>
        <i class="fa fa-angle-right featured-link-arrow" aria-hidden="true"></i>
      </a>
    </div>
  </div>
  <div></div>
  <script>
    (function () {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var card = document.querySelector('.profile');
      if (!card) return;
      card.addEventListener('mousemove', function (e) {
        var r = card.getBoundingClientRect();
        var dx = (e.clientX - (r.left + r.width / 2)) / (r.width / 2);
        var dy = (e.clientY - (r.top + r.height / 2)) / (r.height / 2);
        card.style.transform = 'perspective(700px) rotateY(' + (dx * 7) + 'deg) rotateX(' + (-dy * 7) + 'deg)';
        card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%');
        card.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%');
      });
      card.addEventListener('mouseleave', function () {
        card.style.transform = '';
      });
    })();
  </script>
</body>
</html>
